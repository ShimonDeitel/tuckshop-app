name: Tuckshop
options:
  bundleIdPrefix: com.shimondeitel
  deploymentTarget:
    iOS: "17.0"
settings:
  base:
    DEVELOPMENT_TEAM: W7Q885Q59C
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.0"
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    TARGETED_DEVICE_FAMILY: "1"
targets:
  Tuckshop:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: Tuckshop
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.allowanceledger
        GENERATE_INFOPLIST_FILE: YES
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        MARKETING_VERSION: "1.0"
        DEVELOPMENT_TEAM: W7Q885Q59C
    info:
      path: Tuckshop/Info.plist
      properties:
        UILaunchScreen: {}
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
  TuckshopTests:
    type: bundle.unit-test
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: TuckshopTests
    dependencies:
      - target: Tuckshop
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.allowanceledger.tests
        DEVELOPMENT_TEAM: W7Q885Q59C
  TuckshopUITests:
    type: bundle.ui-testing
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: TuckshopUITests
    dependencies:
      - target: Tuckshop
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.allowanceledger.uitests
        DEVELOPMENT_TEAM: W7Q885Q59C
schemes:
  Tuckshop:
    build:
      targets:
        Tuckshop: all
    test:
      targets:
        - TuckshopTests
        - TuckshopUITests
    run:
      config: Debug
